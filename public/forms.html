<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Forms</title>
  </head>

  <body>
    <form name="website-review" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="website-review" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="text" name="businessName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="url" name="currentWebsite" />
      <select name="businessType">
        <option>Other</option>
      </select>
      <select name="serviceInterest">
        <option>Starter Website</option>
        <option>Portfolio Website</option>
        <option>Website Refresh</option>
        <option>Monthly Care Plan</option>
        <option>Not Sure Yet</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
