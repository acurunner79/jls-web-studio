<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Request Received | JLS Web Studio</title>

    <meta
      name="description"
      content="Thank you for contacting JLS Web Studio. Your request has been received."
    />

    <meta name="theme-color" content="#0f172a" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #0f172a;
        font-synthesis: none;
        text-rendering: optimizeLegibility;

        --navy: #0f172a;
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --text: #111827;
        --muted: #475569;
        --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .success-section {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 72px 20px;
        background:
          radial-gradient(circle at 65% 20%, rgba(37, 99, 235, 0.38), transparent 34%),
          linear-gradient(135deg, #0f172a 0%, #111827 55%, #1e3a8a 100%);
      }

      .success-card {
        width: min(720px, 100%);
        padding: 44px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 28px;
        background: #ffffff;
        box-shadow: var(--shadow);
        text-align: center;
      }

      .section-kicker {
        margin: 0 0 12px;
        color: var(--blue);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(2.2rem, 5vw, 3.6rem);
        line-height: 1;
        letter-spacing: -0.055em;
      }

      p {
        margin: 20px auto 0;
        max-width: 560px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.7;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        margin-top: 30px;
        padding: 0 22px;
        border-radius: 999px;
        background: var(--blue);
        color: #ffffff;
        font-weight: 800;
      }

      .btn:hover {
        background: var(--blue-dark);
      }

      @media (max-width: 560px) {
        .success-card {
          padding: 32px 24px;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>

  <body>
    <main class="success-section">
      <section class="success-card">
        <p class="section-kicker">Request received</p>

        <h1>Thank you. Your message has been sent.</h1>

        <p>
          I’ll review your information and use it to identify the best starting
          point for your website project.
        </p>

        <a class="btn" href="/">Back to Home</a>
      </section>
    </main>
  </body>
</html>
